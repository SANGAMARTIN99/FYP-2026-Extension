<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AegisBrowse - Access Blocked</title>
  <style>
    :root {
      --bg: #0a0f0d;
      --text: #f1f5f9;
      --yellow: #eab308;
      --red: #ef4444;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      max-width: 600px;
      padding: 40px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(234, 13, 10, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 15px;
      color: var(--red);
    }
    p {
      color: #94a3b8;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .url {
      display: block;
      margin: 20px 0;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      font-family: monospace;
      color: var(--yellow);
      word-break: break-all;
    }
    .footer {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--yellow);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🛡️</div>
    <h1>Access Restricted</h1>
    <p>AegisBrowse Administration has blocked access to this domain due to organizational security policies.</p>
    <div class="url" id="blocked-url">Searching...</div>
    <div id="blocked-reason" style="margin-top: 10px; color: #ef4444; font-size: 14px; font-weight: bold;"></div>
    <div class="footer" style="margin-top: 20px;">Secured by AegisBrowse</div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
